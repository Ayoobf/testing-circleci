version: 2.1
# Goal: 


jobs:
  build_h:
    docker:
      - image: cimg/python:3.14

    environment:
      NAME: Ayoob

    steps:
      - checkout
      - restore_cache:
          name: "Get last database run"
          key: clamav-db-  
      - run: echo "THE VERSION IS \n" 
      - run: jq '."dbs"["daily.cvd"]["local version"]' ~/.cvdupdate/state.json
      - run:
          name: "Saying hello"
          command: echo "Hello $NAME 2"
      - run:
          name: "Installing Clamav"
          command: pip install cvdupdate 
      - run:
          name: "pulling database"
          command: cvd update
      - run:
          name: "Download Jfrog CLI"
          command: curl -fL https://install-cli.jfrog.io | sh
      - run: echo "curl"
      - save_cache:
          name: "Save database"
          paths:
            - ~/.cvdupdate/database
          key: clamav-db-{{ epoch }} 
          when: on_success
      - run:
          name: Testing project secret1
          command: echo $SECRET1
        
workflows:
  build a hello world: 
